name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore CustomerService.slnx

      - name: Build
        run: dotnet build CustomerService.slnx -c Release --no-restore

      - name: Test
        run: dotnet test CustomerService.slnx -c Release --no-build --verbosity normal
